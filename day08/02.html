<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes amos {
            0%{
                left: 0;
            background-color: red;} 

            100%
            { left: 300px;
            background-color: green;}
            
        }

        .box{
            width: 300px;
            height: 300px;
            background-color: gray;
            position: relative;
            animation-name: amos;
            animation-duration: 3s;
            /*  animation: name duration timing-function(速度linear均速) delay iteration-count (播放次數infinite循環)direction (reverse反向播放alternate來回播放)fill-mode(填充模式，動畫的生命周期); play-state(running 預設值 paused暫停) */
            animation-delay: 2s;
            animation-timing-function: linear;
            animation-iteration-count: 3;
            animation-direction: reverse;
            /* animation-play-state: paused; */
            animation-fill-mode: both;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    
</body>
</html>
