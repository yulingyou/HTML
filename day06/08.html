<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .wrap {
        width: 960px;
        height: 812px;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        flex-direction: column;
      }
      .item {
        width: 695px;
        height: 430px;
        margin: 10px;
        padding: 10px;
        justify-content: center;
        position: relative;
        /* position: relative; */
        left: 150px;
        top: 150px;
      }
      .item img {
        width: 100%;
      }
      .item .tab {
        background-color: red;
        color: white;
        padding: 4px 16px;
        position: absolute;
        top: 220px;
        right: -2px;
      }

      .title {
        height: 388px;
        width: 355px;
        background-color: gray;
        z-index: 999;
        position: absolute;
      }
      .text {
        height: 275px;
        width: 682px;
        background-color: orange;
        position: absolute;
        top: 600px;
        left: 300px;
        z-index: 2;
      }
      .gray {
        width: 439px;
        height: 290px;
        background-color: rgba(177, 177, 177, 0.585);
        position: absolute;
        left: 800px;
        top: 50px;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">
        <h2>操控樂趣</h2>
        <h3>人人滿意的駕駛體驗</h3>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Iure error
          ratione quasi cupiditate necessitatibus recusandae
        </p>
      </div>
      <div class="text"></div>

      <div class="item">
        <div class="tab">></div>
        <img src="https://picsum.photos/300/200/?random=10" />
      </div>

      <div class="gray"></div>
    </div>
  </body>
</html>
