<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .arrow {
        width: 0px;
        height: 0px;
        border-top: 30px solid green;
        border-right: 30px solid transparent;
        border-bottom: 30px solid transparent;
        /* border-left: 30px solid transparent; */
      }
      .flag {
        background-color: #ff0;
        font-size: 13px;
        text-align: center;
        width: 40px;
        height: 40px;
        line-height: 40px;
        position: relative;
      }
      .flag::after {
        content: "";
        position: absolute;
        width: 0;
        height: 0;
        border-left: 20px solid #ff0;
        border-right: 20px solid #ff0;
        border-bottom: 10px solid white;
        top: 100%;
        left: 0;
        /* bottom: -10px */
      }
      .circle {
        width: 500px;
        height: 500px;
        background-color: orange;
        margin: 30px;
        border-radius: 50%;
        overflow: auto;
        /* overflow: hidden; */
      }
      img {
        width: 900px;
        height: 400px;
        /* width: 100%;
        height: 100%; */
        object-fit: cover;
        object-position: center center;
      }
    </style>
  </head>
  <body>
    <div class="arrow"></div>
    <div class="flag">38折</div>
    <div class="circle">
      <img src="https://picsum.photos/300/200/?random=10" />
    </div>
  </body>
</html>
