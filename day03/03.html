<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .wrap {
        width: 500px;
        height: 500px;
        background-color: gray;
        display: flex;
        flex-direction: row;
        writing-mode: row;
        flex-wrap: wrap;
        /* (有flex-wrap就會出現彈性列) */
        /* justify-content: space-evenly; */

        align-content: space-evenly;
        /* (在flex-wrap下才會看得出作用，因需彈性列) */
        align-items: flex-start;
        /* (沒彈性列可獨立作用) */
      }
      .item {
        width: 120px;
        height: 120px;
        font-size: 20px;
        background-color: blueviolet;
        /* border: 3px solid red; */
        padding: 12px;
        margin: 4px;
        /* box-sizing: border-box; */
      }
      .item:first-child,
      .item:nth-child(5) {
        height: 170px;
      }
      .item:nth-child(-n + 3) {
        background-color: red;
      }

      .i2 {
        order: 0;
      }

      .i3 {
        order: 1;
      }

      /* .i2 {
        align-self: flex-end;
      } */
    </style>
  </head>
  <body dir="ltr">
    <div class="wrap">
      <div class="item i1">1中文</div>
      <div class="item i2">2中文</div>
      <div class="item i3">3中文</div>
      <div class="item i4">4中文</div>
      <div class="item i5">5中文</div>
    </div>
  </body>
</html>
